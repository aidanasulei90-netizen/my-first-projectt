<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuн отбасым - Ойындар жинағы</title>
    <style>
        /* Қаріпті қосу */
        @font-face {
            font-family: 'KZSupercell-Magic';
            src: url('KZSupercell-Magic.ttf');
        }

        :root {
            --primary-color: #ff0000; /* Қып-қызыл */
            --secondary-color: #ffa502;
            --success-color: #2ed573;
            --danger-color: #ff4757;
            --card-bg: rgba(255, 255, 255, 0.9);
            --gradient: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
        }

        header { text-align: center; margin: 20px 0; }

        h1 {
            font-family: 'KZSupercell-Magic', 'Arial Black', sans-serif;
            font-size: 4rem;
            color: var(--primary-color);
            text-shadow: 4px 4px 0px #fff;
            margin: 10px 0;
        }

        /* Мәзір */
        .menu-container {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 5px solid #fff;
        }

        .menu-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .menu-btn-1 { background: linear-gradient(135deg, #ff7f50, #ff4757); }
        .menu-btn-2 { background: linear-gradient(135deg, #1e90ff, #3742fa); }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: white;
            border: 3px solid var(--secondary-color);
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
        }

        /* 1-ші Ойын: Фото Альбом */
        .family-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }

        .img-card {
            aspect-ratio: 1;
            background: white;
            border-radius: 24px;
            border: 6px solid var(--secondary-color);
            cursor: pointer;
            overflow: hidden;
            transition: 0.1s;
            position: relative;
            box-shadow: 0 8px 0px #d38c00;
        }

        /* БАТЫРМА БАСЫЛҒАНДАҒЫ ЭФФЕКТ */
        .img-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #d38c00;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; }

        /* 2-ші Ойын: Қажетті заттар */
        .game-wrapper {
            width: 90%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .character-avatar {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 8px solid var(--secondary-color);
            overflow: hidden;
            background: white;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .character-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .items-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .item-box {
            width: 130px;
            height: 130px;
            background: white;
            border: 4px solid #ced6e0;
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            transition: 0.1s;
            box-shadow: 0 6px 0px #ced6e0;
            position: relative;
        }

        /* ЗАТТАР БАСЫЛҒАНДАҒЫ ЭФФЕКТ */
        .item-box:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px #ced6e0;
        }

        .item-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-box.correct { border-color: var(--success-color); pointer-events: none; transform: none !important; box-shadow: none !important; }
        .item-box.incorrect { border-color: var(--danger-color); animation: shake 0.4s; transform: none !important; box-shadow: none !important; }

        .hidden { display: none !important; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <button id="back-to-menu-btn" class="back-btn hidden" onclick="showMainMenu()">⬅ Мәзір</button>

    <header>
        <h1 id="main-header">Менің отбасым</h1>
    </header>

    <div class="menu-container" id="main-menu">
        <button class="menu-btn menu-btn-1" onclick="startFamilyAlbum()">📸 1-Ойын: Отбасы мүшелерін ата </button>
        <button class="menu-btn menu-btn-2" onclick="startItemsGame()">🎒 2-Ойын: Қажетті заттар көрсет</button>
    </div>

    <div class="album-container hidden" id="family-album-screen">
        <div class="family-grid">
            <div class="img-card" onclick="playFamilyMember(1)"><img src="ata.png"></div>
            <div class="img-card" onclick="playFamilyMember(2)"><img src="azhe.png"></div>
            <div class="img-card" onclick="playFamilyMember(3)"><img src="ake.png"></div>
            <div class="img-card" onclick="playFamilyMember(4)"><img src="ana.png"></div>
            <div class="img-card" onclick="playFamilyMember(5)"><img src="aga.png"></div>
            <div class="img-card" onclick="playFamilyMember(6)"><img src="apke.png"></div>
            <div class="img-card" onclick="playFamilyMember(7)"><img src="bope.png"></div>
        </div>
    </div>

    <div class="game-wrapper hidden" id="items-game-screen">
        <div id="active-game-stage">
            <div class="character-avatar"><img id="current-char-img" src=""></div>
            <h2 id="quest-title" style="font-size: 1.8rem; color: #2f3542;"></h2>
            <div class="items-grid" id="items-container"></div>
        </div>
        <div id="game-finish-screen" class="hidden">
            <h2 style="font-size: 3rem; color: #2ed573;">🏆 Жарайсың!</h2>
            <button class="menu-btn menu-btn-1" onclick="showMainMenu()">Қайта бастау</button>
        </div>
    </div>

    <audio id="snd-tyng" src="tyng.mp3" preload="auto"></audio>
    <audio id="snd-member" src="" preload="auto"></audio>
    
    <audio id="snd-correct" src="correct.mp3" preload="auto"></audio>
    <audio id="snd-incorrect" src="incorrect.mp3" preload="auto"></audio>

    <script>
        const sndTyng = document.getElementById('snd-tyng');
        const sndMember = document.getElementById('snd-member');
        const sndCorrect = document.getElementById('snd-correct');
        const sndIncorrect = document.getElementById('snd-incorrect');
        let audioTimer = null;

        // 1-ШІ ОЙЫН: ДЫБЫС ЛОГИКАСЫ (Тек кейіпкер дыбысы бірден ойнайды)
        function playFamilyMember(id) {
            // Ескі таймер мен ойнап тұрған дыбысты тоқтату
            if (audioTimer) clearTimeout(audioTimer);
            sndMember.pause();

            // Тек кейіпкердің өз аудиосы ешқандай кідіріссіз бірден іске қосылады
            sndMember.src = 'Audio' + id + '.mp3';
            sndMember.currentTime = 0;
            sndMember.play().catch(e => console.log("Файл табылмады немесе браузер бұғаттады: Audio" + id + ".mp3"));
        }

        function showMainMenu() {
            if (audioTimer) clearTimeout(audioTimer);
            sndMember.pause();
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('family-album-screen').classList.add('hidden');
            document.getElementById('items-game-screen').classList.add('hidden');
            document.getElementById('back-to-menu-btn').classList.add('hidden');
        }

        function startFamilyAlbum() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('family-album-screen').classList.remove('hidden');
            document.getElementById('back-to-menu-btn').classList.remove('hidden');
        }

        // 2-ШІ ОЙЫН: ЛОГИКА ЖӘНЕ ШАРТТАР
        const stages = [
            { name: "Атаға", img: "ata.png", items: [
                {img:"tayak.png",c:true}, {img:"koziryek.png",c:true}, 
                {img:"oiynshyk.png",c:false}, {img:"taka.png",c:true}
            ]},
            { name: "Әжеге", img: "azhe.png", items: [
                {img:"urshyk.png",c:true}, {img:"oramal.png",c:true}, 
                {img:"jip.png",c:true}, {img:"roller.png",c:false}
            ]},
            { name: "Әкеге", img: "ake.png", items: [
                {img:"1.png",c:true}, {img:"kuraldar.png",c:true}, 
                {img:"kuyrshak.png",c:false}, {img:"kurek.png",c:true}
            ]},
            { name: "Анаға", img: "ana.png", items: [
                {img:"pomada.png",c:true}, {img:"ydys.png",c:true}, {img:"gul.png",c:true}, 
                {img:"balga.png",c:false}, {img:"somke.png",c:false}
            ]},
            { name: "Ағаға", img: "aga.png", items: [
                {img:"dop.png",c:true}, {img:"comp.png",c:true}, {img:"skate.png",c:true}, 
                {img:"shiy.png",c:false}, {img:"emizik.png",c:false}
            ]},
            { name: "Әпкеге", img: "apke.png", items: [
                {img:"kitap.png",c:true}, {img:"kraska.png",c:true}, {img:"rolik.png",c:false}, 
                {img:"kaska.png",c:true}, {img:"britva.png",c:false}
            ]},
            { name: "Бөпеге", img: "bope.png", items: [
                {img:"arba.png",c:true}, {img:"emizi.png",c:true}, {img:"oiynshy.png",c:true}, {img:"syldyrmak.png",c:true}, 
                {img:"kilt.png",c:false}
            ]}
        ];

        let curS = 0;
        let score = 0;

        function startItemsGame() {
            sndTyng.currentTime = 0;
            sndTyng.play().catch(e=>{});
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('items-game-screen').classList.remove('hidden');
            document.getElementById('back-to-menu-btn').classList.remove('hidden');
            curS = 0;
            loadStage();
        }

        function loadStage() {
            if(curS >= stages.length) {
                document.getElementById('active-game-stage').classList.add('hidden');
                document.getElementById('game-finish-screen').classList.remove('hidden');
                return;
            }
            const s = stages[curS];
            document.getElementById('current-char-img').src = s.img;
            document.getElementById('quest-title').textContent = s.name + " қажетті затты тап:";
            const cont = document.getElementById('items-container');
            cont.innerHTML = '';
            score = 0;
            const goal = s.items.filter(i => i.c).length;

            s.items.forEach(item => {
                const box = document.createElement('div');
                box.className = 'item-box';
                const img = document.createElement('img');
                img.src = item.img;
                box.appendChild(img);
                box.onclick = () => {
                    if(item.c) {
                        // ДҰРЫС ЖАУАП ДЫБЫСЫ БІРДЕН ОЙНАЙДЫ ЖӘНЕ ЖАСЫЛ ТҮС КҮШІНЕ ЕНЕДІ
                        sndCorrect.currentTime = 0;
                        sndCorrect.play().catch(e=>{});
                        
                        box.classList.add('correct');
                        score++;
                        if(score === goal) setTimeout(() => { curS++; loadStage(); }, 800);
                    } else {
                        // ҚАТЕ ЖАУАП ДЫБЫСЫ БІРДЕН ОЙНАЙДЫ ЖӘНЕ ҚЫЗЫЛ СІЛКІНУ ЭФФЕКТІСІ ІСКЕ ҚОСЫЛАДЫ
                        sndIncorrect.currentTime = 0;
                        sndIncorrect.play().catch(e=>{});
                        
                        box.classList.add('incorrect');
                        setTimeout(() => box.classList.remove('incorrect'), 500);
                    }
                };
                cont.appendChild(box);
            });
        }
    </script>
</body>
</html>
